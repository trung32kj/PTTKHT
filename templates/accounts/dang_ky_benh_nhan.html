{% extends 'base.html' %}

{% block title %}Đăng ký bệnh nhân{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 2rem auto;">
    <h2 style="margin-bottom: 1.5rem;">Đăng ký tài khoản bệnh nhân</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label>Tên đăng nhập *</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Mật khẩu *</label>
            <input type="password" name="password" required>
        </div>
        <div class="form-group">
            <label>Họ *</label>
            <input type="text" name="last_name" required>
        </div>
        <div class="form-group">
            <label>Tên *</label>
            <input type="text" name="first_name" required>
        </div>
        <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Ngày sinh *</label>
            <input type="date" name="date_of_birth" required>
        </div>
        <div class="form-group">
            <label>Giới tính *</label>
            <select name="gender" required>
                <option value="M">Nam</option>
                <option value="F">Nữ</option>
                <option value="O">Khác</option>
            </select>
        </div>
        <div class="form-group">
            <label>Số điện thoại *</label>
            <input type="text" name="phone" required>
        </div>
        <div class="form-group">
            <label>Địa chỉ</label>
            <textarea name="address" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>Ảnh đại diện</label>
            <input type="file" name="anh_dai_dien" accept="image/*" id="anh_input">
            <small style="color: #666;">Định dạng: JPG, PNG. Kích thước tối đa: 5MB</small>
            <div id="preview_container" style="margin-top: 1rem; display: none;">
                <img id="preview_img" style="max-width: 200px; max-height: 200px; border-radius: 8px;">
            </div>
        </div>
        <button type="submit" class="btn" style="width: 100%;">Đăng ký</button>
    </form>
    <p style="text-align: center; margin-top: 1rem;">
        Đã có tài khoản? <a href="{% url 'dang_nhap' %}">Đăng nhập</a>
    </p>
</div>

<script>
document.getElementById('anh_input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('preview_img').src = event.target.result;
            document.getElementById('preview_container').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
});
</script>
{% endblock %}
