{% extends 'base.html' %}

{% block title %}Đăng nhập{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 3rem auto;">
    <h2 style="margin-bottom: 1.5rem; text-align: center;">Đăng nhập</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn" style="width: 100%;">Đăng nhập</button>
    </form>
    <p style="text-align: center; margin-top: 1rem;">
        Chưa có tài khoản? <a href="{% url 'dang_ky' %}">Đăng ký ngay</a>
    </p>
</div>
{% endblock %}
