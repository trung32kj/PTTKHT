{% extends 'base.html' %}

{% block title %}Quên mật khẩu{% endblock %}

{% block content %}
<div class="card form-container">
    <h2>🔑 Quên mật khẩu</h2>
    <p style="color: var(--text-light); margin-bottom: 1.5rem;">
        Nhập tên đăng nhập của bạn. Nếu tài khoản tồn tại, bạn sẽ được đặt lại mật khẩu.
    </p>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" name="username" required placeholder="Nhập tên đăng nhập">
        </div>
        <div class="form-group">
            <label>Mật khẩu mới</label>
            <input type="password" name="new_password" required minlength="6" placeholder="Ít nhất 6 ký tự">
        </div>
        <div class="form-group">
            <label>Xác nhận mật khẩu mới</label>
            <input type="password" name="confirm_password" required minlength="6" placeholder="Nhập lại mật khẩu">
        </div>
        <button type="submit" class="btn">Đặt lại mật khẩu</button>
    </form>
    <p class="form-footer">
        Nhớ mật khẩu? <a href="{% url 'dang_nhap' %}">Đăng nhập</a>
    </p>
</div>
{% endblock %}
