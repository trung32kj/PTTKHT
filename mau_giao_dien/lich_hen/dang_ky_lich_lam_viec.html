{% extends 'base.html' %}

{% block title %}Đăng ký lịch làm việc{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Đăng ký lịch làm việc</h2>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Ngày làm việc *</label>
            <input type="date" name="ngay" required min="{{ today }}">
        </div>
        
        <div class="form-group">
            <label>Giờ bắt đầu *</label>
            <input type="time" name="gio_bat_dau" required>
        </div>
        
        <div class="form-group">
            <label>Giờ kết thúc *</label>
            <input type="time" name="gio_ket_thuc" required>
        </div>
        
        <button type="submit" class="btn btn-success" style="width: 100%;">Đăng ký lịch làm việc</button>
    </form>
    
    <a href="{% url 'lich_lam_viec_cua_toi' %}" class="btn" style="margin-top: 1rem; display: block; text-align: center;">Xem lịch làm việc của tôi</a>
</div>

<script>
// Set minimum date to today
document.addEventListener('DOMContentLoaded', function() {
    const today = new Date().toISOString().split('T')[0];
    document.querySelector('input[name="ngay"]').setAttribute('min', today);
});
</script>
{% endblock %}
